<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>show</title>
    <link rel="stylesheet" href="css/show.css" />
  </head>

  <body>
    <div class="show-element">
      <button
        class="show-btn"
        id="btn"
        aria-expanded="false"
        aria-controls="myContent"
      ></button>

      <div class="show-wrapper" id="myContent">
        <div class="show-inner">
          <p>おはよう</p>
          <p>今日もいい天気ですね</p>
        </div>
      </div>
    </div>

    <script src="js/show.js" defer></script>
  </body>
</html>
